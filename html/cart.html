<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store Cart</title>
  <link rel="stylesheet" href="../styles/storeCart.css"/>
</head>

<body>

  <header class="cart-header">
    <h1>Your Cart</h1>
    <a href="index.html" class="back-link">← Continue shopping</a>
  </header>

  <main class="cart-container">

    <!-- LEFT SIDE: PRODUCTS -->
    <section class="cart-items">

      <!-- PRODUCT CARD (template for JS rendering) -->
      <div class="cart-item">
        <div class="item-image"></div>

        <div class="item-info">
          <h3 class="item-name">Nike Air Zoom</h3>
          <p class="item-price">$120</p>

          <div class="quantity-controls">
            <button class="qty-btn">-</button>
            <span class="qty">1</span>
            <button class="qty-btn">+</button>
          </div>

          <button class="remove-btn">Remove</button>
        </div>
      </div>

      <!-- JS will inject more items here -->

    </section>

    <!-- RIGHT SIDE: SUMMARY -->
    <aside class="cart-summary">

      <h2>Order Summary</h2>

      <div class="summary-row">
        <span>Items (3)</span>
        <span>$360</span>
      </div>

      <div class="summary-row">
        <span>Shipping</span>
        <span>Free</span>
      </div>

      <div class="summary-row total">
        <span>Total</span>
        <span>$360</span>
      </div>

      <button class="checkout-btn">
        Proceed to Checkout
      </button>

      <div class="payment-info">
        <p>We accept:</p>
        <div class="cards">
          <span>VISA</span>
          <span>MasterCard</span>
          <span>PayPal</span>
        </div>
      </div>

    </aside>

  </main>

</body>
</html>
