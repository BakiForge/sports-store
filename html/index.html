<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportsStore.com</title>
  <link rel="stylesheet" href="../styles/style.css">
  <link rel="stylesheet" href="../styles/categories.css">
  <link rel="stylesheet" href="../styles/products.css">
</head>
<body>
  <nav class="navbar">
        <div class="logo">
            <img class="store-logo" title="logo" src="../images/store-logo.png">
        </div>

        <input type="checkbox" id="menu-toggle">

        <label for="menu-toggle" class="hamburger">
            ☰
        </label>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#products">Products</a></li>
            <li><a href="#">Contact</a></li>
            <li>
                <a href="cart.html" target="_blank" class="cart js-cart">
                    Cart
                    <span class="cart-count">3</span>
                </a>
            </li>
        </ul>
    </nav>

    <main>
      <section class="hero">
      <div class="hero-content">
        <h1 class="hero-title">Top Sports Gear</h1>
        <p>Become best version of yourself. Shop with Sports Store.</p>
        <p>Here you will find everything for sports you can imagine.</p>

        <div class="hero-buttons">
          <a href="#products" class="btn primary">Shop Now</a>
          <a href="#categories" class="btn secondary">View Categories</a>
        </div>
      </div>

      <div class="hero-image">
        <img src="../images/basketball-shoe-hero-removebg-preview.png" alt="Sports gear" />
      </div>
    </section>

    <section class="categories" id="categories">

        <h2>Categories</h2>

        <div class="categories-container">

            <div class="category-card">
                <img src="../images/football-cones-and-training-equipment.webp" alt="Football">
                <div class="category-overlay">
                    <h3>Football</h3>
                </div>
            </div>

            <div class="category-card">
                <img src="../images/basketball-on-court-action-shot-of-game-equipment-for-sportsgraphy-and-team-competition-photo.jpeg" alt="Basketball">
                <div class="category-overlay">
                    <h3>Basketball</h3>
                </div>
            </div>

            <div class="category-card">
                <img src="../images/asics_homepage_desktop_hero_c26_020124.webp" alt="Running">
                <div class="category-overlay">
                    <h3>Running</h3>
                </div>
            </div>

            <div class="category-card">
                <img src="../images/equipment (6).jpg" alt="Fitness">
                <div class="category-overlay">
                    <h3>Fitness</h3>
                </div>
            </div>
        </div>
    </section>

    <section class="featured-products" id="products">
          <h2 class="section-title">Featured Products</h2>

          <div class="products-grid js-products-grid">

            <!-- PRODUCT CARD (template za JS kasnije) -->
            <div class="product-card js-product-card">
            </div>
          </div>
   </section>
  </main>
  <script src="../scripts/store.js" type="module"></script>
</body>
</html>
