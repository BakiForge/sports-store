<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportsStore.com</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
  <nav class="navbar">
        <div class="logo">
            <img class="store-logo" title="logo" src="../images/store-logo.png">
        </div>

        <input type="checkbox" id="menu-toggle">

        <label for="menu-toggle" class="hamburger">
            ☰
        </label>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">Contact</a></li>
            <li>
                <a href="#" class="cart">
                    Cart
                    <span class="cart-count">3</span>
                </a>
            </li>
        </ul>
    </nav>

    <section class="hero">
      <div class="hero-content">
        <h1 class="hero-title">Top Sports Gear</h1>
        <p>Become best version of yourself. Shop with Sports Store.</p>

        <div class="hero-buttons">
          <a href="#products" class="btn primary">Shop Now</a>
          <a href="#categories" class="btn secondary">View Categories</a>
        </div>
      </div>

      <div class="hero-image">
        <img src="../images/basketball-shoe-hero-removebg-preview.png" alt="Sports gear" />
      </div>
    </section>

</body>
</html>
